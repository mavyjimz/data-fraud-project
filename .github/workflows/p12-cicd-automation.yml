# Version 1.3 - Complete Fix: Master branch + Lowercase Tags + Custom File Path
name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Points to your existing folder structure
          file: ./docker/Dockerfile
          push: true
          # Hardcoded lowercase project name to avoid registry naming errors
          tags: ghcr.io/${{ github.repository_owner }}/data-fraud-project:latest
